name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - run: npm ci
      - run: npm run build
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: LoBeats-windows
          path: dist/LoBeats-windows.exe

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - run: npm ci
      - run: npm run build:linux
      - name: Upload Linux DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: LoBeats-linux-deb
          path: dist/LoBeats-linux.deb
      - name: Upload Linux ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: LoBeats-linux-zip
          path: dist/LoBeats-linux.zip

  release:
    name: Create GitHub Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Get Version
        id: get_version
        run: echo "VERSION=$(node -p \"require('./package.json').version\")" >> $GITHUB_ENV
      - name: Download Windows artifact
        uses: actions/download-artifact@v3
        with:
          name: LoBeats-windows
      - name: Download Linux DEB artifact
        uses: actions/download-artifact@v3
        with:
          name: LoBeats-linux-deb
      - name: Download Linux ZIP artifact
        uses: actions/download-artifact@v3
        with:
          name: LoBeats-linux-zip
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: v${{ env.VERSION }}
          release_name: LoBeats v${{ env.VERSION }}
          draft: false
          prerelease: false
      - name: Upload Windows asset
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: dist/LoBeats-windows.exe
          asset_name: LoBeats-windows.exe
          asset_content_type: application/octet-stream
      - name: Upload Linux DEB asset
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: dist/LoBeats-linux.deb
          asset_name: LoBeats-linux.deb
          asset_content_type: application/octet-stream
      - name: Upload Linux ZIP asset
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: dist/LoBeats-linux.zip
          asset_name: LoBeats-linux.zip
          asset_content_type: application/octet-stream
